name: Pubblica menu Telegram ogni giorno v2

on:
  schedule:
    - cron: '17 10 * * 1-5'
      timezone: 'Europe/Rome'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Test senza inviare Telegram'
        required: true
        default: true
        type: boolean
      test_today:
        description: 'Data test opzionale, formato YYYY-MM-DD'
        required: false
        type: string

jobs:
  send-telegram-menu:
    runs-on: ubuntu-latest

    env:
      TZ: Europe/Rome
      APP_TZ: Europe/Rome
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && '1' || '0' }}
      DEBUG: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
      TEST_TODAY: ${{ github.event_name == 'workflow_dispatch' && inputs.test_today || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl requests

      - name: Run send_menu.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_menu.py
